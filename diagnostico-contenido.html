<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EAGR Learn | Content Diagnostics</title>
  <link rel="stylesheet" href="./css/app.css"/>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Content Diagnostics</h1>
      <p>Use this page to test whether a direct URL is reachable from the web.</p>
      <label for="url">Direct URL</label>
      <input id="url" type="url" placeholder="https://example.com/assets/file.pdf"/>
      <div class="actions" style="margin-top:14px;">
        <button id="testBtn" class="primary">Test URL</button>
      </div>
      <pre id="result" style="white-space:pre-wrap;background:rgba(255,255,255,.06);padding:16px;border-radius:16px;margin-top:18px;"></pre>
    </section>
  </main>
  <script>
    const btn = document.getElementById('testBtn');
    const input = document.getElementById('url');
    const result = document.getElementById('result');
    btn.addEventListener('click', async () => {
      const url = input.value.trim();
      if(!url){ result.textContent = 'Please enter a URL.'; return; }
      result.textContent = 'Testing...';
      try {
        const r = await fetch(url, { method:'GET' });
        result.textContent = `Status: ${r.status} ${r.statusText}
Content-Type: ${r.headers.get('content-type') || 'unknown'}
Final URL: ${r.url}`;
      } catch (err) {
        result.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
